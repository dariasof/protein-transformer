# 1M-parameter model.

seed: 42                      

model:
  n_layers: 6
  d_model: 256
  n_heads: 8
  d_ff: 1024                  # 4 × d_model
  dropout: 0.1
  
training:
  batch_size: 64              
  learning_rate: 3.0e-4       
  max_grad_norm: 1.0
  n_epochs: 10                
  warmup_ratio: 0.06
  precision: fp16            
  checkpoint_every: 500      
  retain_every: 500          
  wandb_project: protein-mlm

data:
  n_proteins: 100000        
  min_length: 30             
  max_len: 512               
  masking:
    mask_prob: 0.15         
    mask_token_prob: 0.80   
    random_token_prob: 0.10  